<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>限りなく灰色へMV - 25時、ナイトコードで。</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #2a2a2a 50%, #0a0a0a 100%);
            color: #e0e0e0;
            line-height: 1.6;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 灰色渐变背景 */
        .gray-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .gradient-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(80, 80, 80, 0.1) 0%, transparent 50%, rgba(120, 120, 120, 0.1) 100%);
            animation: gradientShift 15s infinite alternate;
        }

        .gradient-layer:nth-child(2) {
            animation-delay: -5s;
            background: linear-gradient(135deg, rgba(100, 100, 100, 0.1) 0%, transparent 50%, rgba(140, 140, 140, 0.1) 100%);
        }

        .gradient-layer:nth-child(3) {
            animation-delay: -10s;
            background: linear-gradient(225deg, rgba(60, 60, 60, 0.1) 0%, transparent 50%, rgba(160, 160, 160, 0.1) 100%);
        }

        @keyframes gradientShift {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            100% {
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        /* 灰色粒子效果 */
        .gray-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(180, 180, 180, 0.6);
            border-radius: 50%;
            animation: particleFloat 20s infinite linear;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(180deg);
                opacity: 0;
            }
        }

        /* 视频播放器容器 */
        .video-container {
            background: rgba(40, 40, 40, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(150, 150, 150, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 800px;
            box-shadow:
                0 0 30px rgba(100, 100, 100, 0.5),
                inset 0 0 20px rgba(150, 150, 150, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .video-container:hover {
            transform: translateY(-5px);
            box-shadow:
                0 0 40px rgba(120, 120, 120, 0.7),
                inset 0 0 20px rgba(170, 170, 170, 0.3);
        }

        .video-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(150, 150, 150, 0.1), transparent);
            transition: left 0.7s;
        }

        .video-container:hover::before {
            left: 100%;
        }

        /* 标题样式 */
        h1 {
            font-size: 2.8rem;
            color: #f0f0f0;
            text-shadow: 0 0 10px rgba(180, 180, 180, 0.7);
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .subtitle {
            color: #c8c8c8;
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 视频播放器样式 */
        video {
            width: 100%;
            max-width: 700px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(120, 120, 120, 0.5);
            margin: 20px 0;
            outline: none;
            background: #000;
        }

        /* 自定义视频控件 */
        .video-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }

        .control-btn {
            background: rgba(140, 140, 140, 0.7);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn:hover {
            background: rgba(140, 140, 140, 0.9);
            transform: scale(1.1);
        }

        /* 视频信息 */
        .video-info {
            margin-top: 25px;
            padding: 15px;
            background: rgba(50, 50, 50, 0.5);
            border-radius: 10px;
            border-left: 3px solid #909090;
        }

        .video-info h2 {
            color: #d8d8d8;
            margin-bottom: 10px;
            font-size: 1.4rem;
            font-weight: 400;
        }

        .video-info p {
            color: #b8b8b8;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .video-container {
                padding: 25px;
            }

            .video-controls {
                flex-wrap: wrap;
            }
        }

        /* 灰色波纹效果 */
        .gray-ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            top: 0;
            left: 0;
            box-shadow: 0 0 0 0 rgba(150, 150, 150, 0.4);
            animation: ripple 4s infinite;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                box-shadow: 0 0 0 0 rgba(150, 150, 150, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(150, 150, 150, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(150, 150, 150, 0);
            }
        }

        /* 无限符号装饰 */
        .infinity-symbol {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 100px;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            z-index: -1;
        }

        .infinity-symbol::before,
        .infinity-symbol::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(180, 180, 180, 0.5);
            border-radius: 50%;
            top: 0;
        }

        .infinity-symbol::before {
            left: 0;
            transform: rotate(45deg);
        }

        .infinity-symbol::after {
            right: 0;
            transform: rotate(-45deg);
        }

        .infinity-symbol span {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(180, 180, 180, 0.3);
            border-top: none;
            border-right: none;
            top: 10px;
            left: 60px;
            transform: rotate(-45deg);
        }
    </style>
</head>
<body>
    <!-- 灰色渐变背景 -->
    <div class="gray-gradient">
        <div class="gradient-layer"></div>
        <div class="gradient-layer"></div>
        <div class="gradient-layer"></div>
    </div>

    <!-- 无限符号装饰 -->
    <div class="infinity-symbol">
        <span></span>
    </div>

    <!-- 灰色粒子效果 -->
    <div class="gray-particles" id="grayParticles"></div>

    <!-- 视频播放器 -->
    <div class="video-container">
        <div class="gray-ripple"></div>
        <h1>限りなく灰色へ</h1>
        <div class="subtitle">25時、ナイトコードで。</div>

        <video src="限りなく灰色へ .mp4" controls></video>

        <!-- 自定义控件 -->
        <div class="video-controls">
            <button class="control-btn" id="playBtn">▶</button>
            <button class="control-btn" id="pauseBtn">❚❚</button>
            <button class="control-btn" id="fullscreenBtn">⛶</button>
        </div>

        <div class="video-info">
            <h2>MV情報</h2>
            <p>「限りなく灰色へ」のミュージックビデオは、25時、ナイトコードで。の内省的な世界観を視覚的に表現した作品です。無限に灰色へと向かう感情の移り変わりを、モノクロームのビジュアルと叙情的な映像で描き出しています。色のない世界への移行を描いた、哲学的で深みのある作品です。</p>
        </div>
    </div>

    <script>
        // 创建灰色粒子效果
        function createGrayParticles() {
            const particlesContainer = document.getElementById('grayParticles');
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                // 随机位置
                const left = Math.random() * 100;
                particle.style.left = `${left}vw`;

                // 随机延迟和持续时间
                const delay = Math.random() * 20;
                const duration = 15 + Math.random() * 10;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;

                // 随机大小
                const size = 2 + Math.random() * 6;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                // 随机灰度
                const grayValue = 120 + Math.random() * 80;
                particle.style.background = `rgba(${grayValue}, ${grayValue}, ${grayValue}, 0.6)`;

                particlesContainer.appendChild(particle);
            }
        }

        // 自定义视频控件功能
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('video');
            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const container = document.querySelector('.video-container');

            playBtn.addEventListener('click', function() {
                video.play();
                container.style.boxShadow =
                    '0 0 50px rgba(140, 140, 140, 0.8), ' +
                    'inset 0 0 30px rgba(160, 160, 160, 0.4)';
            });

            pauseBtn.addEventListener('click', function() {
                video.pause();
                container.style.boxShadow =
                    '0 0 30px rgba(100, 100, 100, 0.5), ' +
                    'inset 0 0 20px rgba(150, 150, 150, 0.2)';
            });

            fullscreenBtn.addEventListener('click', function() {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.mozRequestFullScreen) {
                    video.mozRequestFullScreen();
                }
            });

            // 视频播放时增强效果
            video.addEventListener('play', function() {
                container.style.boxShadow =
                    '0 0 50px rgba(140, 140, 140, 0.8), ' +
                    'inset 0 0 30px rgba(160, 160, 160, 0.4)';
            });

            video.addEventListener('pause', function() {
                container.style.boxShadow =
                    '0 0 30px rgba(100, 100, 100, 0.5), ' +
                    'inset 0 0 20px rgba(150, 150, 150, 0.2)';
            });
        });

        // 页面加载完成后创建效果
        window.addEventListener('DOMContentLoaded', createGrayParticles);
    </script>
</body>
</html>
