<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25時の情熱MV - 25時、ナイトコードで。</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff4500 0%, #ff8c00 50%, #ffffff 100%);
            color: #333333;
            line-height: 1.6;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 橙红色热情背景 */
        .passion-flame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .flame-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 69, 0, 0.4) 0%, transparent 70%);
            animation: flamePulse 8s infinite alternate;
        }

        .flame-wave:nth-child(2) {
            animation-delay: -2s;
            background: radial-gradient(circle at 30% 70%, rgba(255, 140, 0, 0.4) 0%, transparent 60%);
        }

        .flame-wave:nth-child(3) {
            animation-delay: -4s;
            background: radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
        }

        @keyframes flamePulse {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            100% {
                opacity: 0.7;
                transform: scale(1.2);
            }
        }

        /* 橙红色粒子效果 */
        .flame-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .flame-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: flameFloat 15s infinite linear;
            opacity: 0;
            box-shadow: 0 0 8px currentColor;
        }

        @keyframes flameFloat {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(180deg);
                opacity: 0;
            }
        }

        /* 视频播放器容器 */
        .video-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 69, 0, 0.6);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 800px;
            box-shadow:
                0 0 30px rgba(255, 69, 0, 0.6),
                inset 0 0 20px rgba(255, 140, 0, 0.4);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .video-container:hover {
            transform: translateY(-5px);
            box-shadow:
                0 0 40px rgba(255, 69, 0, 0.8),
                inset 0 0 20px rgba(255, 140, 0, 0.6);
        }

        .video-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 69, 0, 0.3), transparent);
            transition: left 0.7s;
        }

        .video-container:hover::before {
            left: 100%;
        }

        /* 标题样式 */
        h1 {
            font-size: 3rem;
            color: #ff4500;
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.6);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #ff6347;
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* 视频播放器样式 */
        video {
            width: 100%;
            max-width: 700px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6);
            margin: 20px 0;
            outline: none;
            background: #000;
        }

        /* 自定义视频控件 */
        .video-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }

        .control-btn {
            background: rgba(255, 69, 0, 0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn:hover {
            background: rgba(255, 50, 0, 1);
            transform: scale(1.1);
        }

        /* 视频信息 */
        .video-info {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            border-left: 3px solid #ff4500;
        }

        .video-info h2 {
            color: #ff4500;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .video-info p {
            color: #333;
            line-height: 1.5;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .video-container {
                padding: 25px;
            }

            .video-controls {
                flex-wrap: wrap;
            }
        }

        /* 火焰脉冲效果 */
        .flame-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            top: 0;
            left: 0;
            box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.8);
            animation: flamePulseEffect 3s infinite;
            pointer-events: none;
        }

        @keyframes flamePulseEffect {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.8);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 69, 0, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 69, 0, 0);
            }
        }

        /* 时间数字效果 */
        .time-digits {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: monospace;
            font-size: 16px;
            color: rgba(255, 69, 0, 0.3);
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        .digit {
            position: absolute;
            animation: digitFall 20s infinite linear;
        }

        @keyframes digitFall {
            0% {
                transform: translateY(-50px);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* 火焰效果 */
        .fire-pulse {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            opacity: 0.1;
            z-index: -1;
            animation: firePulse 3s infinite;
        }

        .fire-pulse::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            top: 0;
            left: 0;
        }

        @keyframes firePulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.15;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.1;
            }
        }

        /* 底部火焰波浪装饰 */
        .flame-decoration {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ff4500" fill-opacity="0.4" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,197.3C672,192,768,160,864,138.7C960,117,1056,107,1152,117.3C1248,128,1344,160,1392,176L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            z-index: -1;
            animation: flameMove 10s infinite linear;
        }

        @keyframes flameMove {
            0% {
                background-position-x: 0;
            }
            100% {
                background-position-x: 1440px;
            }
        }

        /* 火焰火花效果 */
        .flame-sparks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .spark {
            position: absolute;
            width: 3px;
            height: 10px;
            background: linear-gradient(to top, #ff4500, #ff8c00);
            border-radius: 50%;
            opacity: 0;
            animation: sparkRise 5s infinite linear;
        }

        @keyframes sparkRise {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100px) rotate(180deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 橙红色热情背景 -->
    <div class="passion-flame">
        <div class="flame-wave"></div>
        <div class="flame-wave"></div>
        <div class="flame-wave"></div>
    </div>

    <!-- 时间数字效果 -->
    <div class="time-digits" id="timeDigits"></div>

    <!-- 火焰脉冲效果 -->
    <div class="fire-pulse"></div>

    <!-- 橙红色粒子效果 -->
    <div class="flame-particles" id="flameParticles"></div>

    <!-- 火焰火花效果 -->
    <div class="flame-sparks" id="flameSparks"></div>

    <!-- 底部火焰波浪装饰 -->
    <div class="flame-decoration"></div>

    <!-- 视频播放器 -->
    <div class="video-container">
        <div class="flame-pulse"></div>
        <h1>25時の情熱</h1>
        <div class="subtitle">25時、ナイトコードで。</div>

        <video src="25時の情熱 .mp4" controls></video>

        <!-- 自定义控件 -->
        <div class="video-controls">
            <button class="control-btn" id="playBtn">▶</button>
            <button class="control-btn" id="pauseBtn">❚❚</button>
            <button class="control-btn" id="fullscreenBtn">⛶</button>
        </div>

        <div class="video-info">
            <h2>MV情報</h2>
            <p>「25時の情熱」のミュージックビデオは、25時、ナイトコードで。の世界観を視覚的に表現した作品です。深夜の静けさと内面に燃える情熱を表現した、激しくも情感豊かな映像が特徴です。夜更けに芽生える強い想いと熱い感情を描いた作品です。</p>
        </div>
    </div>

    <script>
        // 创建橙红色粒子效果
        function createFlameParticles() {
            const particlesContainer = document.getElementById('flameParticles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('flame-particle');

                // 随机位置
                const left = Math.random() * 100;
                particle.style.left = `${left}vw`;

                // 随机延迟和持续时间
                const delay = Math.random() * 15;
                const duration = 10 + Math.random() * 10;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;

                // 随机大小
                const size = 2 + Math.random() * 6;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                // 随机颜色 - 使用橙红色调
                const colors = ['#ff4500', '#ff6347', '#ff8c00', '#ff7f50'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.color = color;

                particlesContainer.appendChild(particle);
            }
        }

        // 创建火焰火花效果
        function createFlameSparks() {
            const sparksContainer = document.getElementById('flameSparks');
            const sparkCount = 20;

            for (let i = 0; i < sparkCount; i++) {
                const spark = document.createElement('div');
                spark.classList.add('spark');

                // 随机位置
                const left = Math.random() * 100;
                spark.style.left = `${left}vw`;

                // 随机延迟和持续时间
                const delay = Math.random() * 5;
                const duration = 3 + Math.random() * 4;
                spark.style.animationDelay = `${delay}s`;
                spark.style.animationDuration = `${duration}s`;

                sparksContainer.appendChild(spark);
            }
        }

        // 创建时间数字效果
        function createTimeDigits() {
            const timeDigitsContainer = document.getElementById('timeDigits');
            const digitCount = 30;

            for (let i = 0; i < digitCount; i++) {
                const digit = document.createElement('div');
                digit.classList.add('digit');
                digit.textContent = Math.floor(Math.random() * 2); // 显示0或1

                // 随机位置
                const left = Math.random() * 100;
                digit.style.left = `${left}vw`;

                // 随机延迟和持续时间
                const delay = Math.random() * 20;
                const duration = 15 + Math.random() * 10;
                digit.style.animationDelay = `${delay}s`;
                digit.style.animationDuration = `${duration}s`;

                timeDigitsContainer.appendChild(digit);
            }
        }

        // 自定义视频控件功能
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('video');
            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const container = document.querySelector('.video-container');

            playBtn.addEventListener('click', function() {
                video.play();
                container.style.boxShadow =
                    '0 0 50px rgba(255, 69, 0, 0.9), ' +
                    'inset 0 0 30px rgba(255, 140, 0, 0.6)';
            });

            pauseBtn.addEventListener('click', function() {
                video.pause();
                container.style.boxShadow =
                    '0 0 30px rgba(255, 69, 0, 0.6), ' +
                    'inset 0 0 20px rgba(255, 140, 0, 0.4)';
            });

            fullscreenBtn.addEventListener('click', function() {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.mozRequestFullScreen) {
                    video.mozRequestFullScreen();
                }
            });

            // 视频播放时增强效果
            video.addEventListener('play', function() {
                container.style.boxShadow =
                    '0 0 50px rgba(255, 69, 0, 0.9), ' +
                    'inset 0 0 30px rgba(255, 140, 0, 0.6)';
            });

            video.addEventListener('pause', function() {
                container.style.boxShadow =
                    '0 0 30px rgba(255, 69, 0, 0.6), ' +
                    'inset 0 0 20px rgba(255, 140, 0, 0.4)';
            });
        });

        // 页面加载完成后创建效果
        window.addEventListener('DOMContentLoaded', function() {
            createFlameParticles();
            createFlameSparks();
            createTimeDigits();
        });
    </script>
</body>
</html>
